<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心情签 · Mood Card</title>

<!-- 预连接：建立 TLS 握手，比首次请求快 100-300ms -->
<link rel="preconnect" href="https://kronora-delmaxmax.github.io" crossorigin>
<link rel="dns-prefetch" href="https://kronora-delmaxmax.github.io">

<style>
 * { margin:0; padding:0; box-sizing: border-box; }
 html, body {
 height:100%;
 font-family: -apple-system, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
 background: linear-gradient(160deg, #fef6e4 0%, #f3d2c1 50%, #f4a3a3 100%);
 overflow: hidden;
 -webkit-tap-highlight-color: transparent;
 }
 .stage {
 position: relative;
 width:100%;
 height:100%;
 display: flex;
 align-items: center;
 justify-content: center;
 flex-direction: column;
 padding:20px;
 }
 .brand {
 position: absolute;
 top:18px;
 left:50%;
 transform: translateX(-50%);
 font-size:13px;
 letter-spacing:3px;
 color: rgba(91,58,58,0.7);
 font-weight:300;
 }
 .card-wrap { width:320px; height:480px; margin:8px 0 0 0; }
 .card {
 width:100%;
 height:100%;
 background: #fffaf0;
 border-radius:24px;
 overflow: hidden;
 box-shadow:0 20px 50px rgba(0,0,0,0.15),0 8px 16px rgba(0,0,0,0.08);
 display: flex;
 flex-direction: column;
 align-items: center;
 padding:24px 22px 20px;
 animation: pulse-in 0.5s ease-out;
 position: relative;
 }
 .illus {
 width:240px;
 height:240px;
 flex-shrink:0;
 border-radius:18px;
 overflow: hidden;
 box-shadow:0 6px 18px rgba(0,0,0,0.08);
 background: #f8f0e3;
 position: relative;
 }
 .illus img {
 width:100%;
 height:100%;
 object-fit: cover;
 display: block;
 opacity:0;
 transition: opacity 0.25s ease;
 will-change: opacity;
 }
 .illus img.ready { opacity:1; }
 .divider {
 width:60%;
 height:1px;
 background: #e8d5c4;
 margin:14px 0 10px;
 flex-shrink:0;
 }
 .message {
 flex:1;
 width:100%;
 display: flex;
 align-items: center;
 justify-content: center;
 text-align: center;
 font-size:17px;
 line-height:1.7;
 color: #4a3030;
 font-weight:500;
 padding:0 4px;
 }
 .meta {
 width:100%;
 display: flex;
 justify-content: space-between;
 align-items: center;
 font-size:12px;
 color: #b89090;
 padding-top:10px;
 border-top:1px dashed #e8d5c4;
 flex-shrink:0;
 }
 .nfc-tag {
 text-align: center;
 font-size:11px;
 color: #c8a8a8;
 margin-top:6px;
 flex-shrink:0;
 }
 .toast {
 position: fixed; bottom:60px; left:50%;
 transform: translateX(-50%);
 background: rgba(91,58,58,0.9); color: #fff;
 padding:10px 20px; border-radius:20px;
 font-size:13px; opacity:0;
 transition: opacity 0.3s; pointer-events: none; z-index:100;
 }
 .toast.show { opacity:1; }
 .unsupported {
 position: absolute; bottom:12px; left:50%;
 transform: translateX(-50%);
 padding:8px 14px;
 background: rgba(255,214,165,0.5);
 border-radius:12px; font-size:12px; color: #8a5a3a;
 white-space: nowrap;
 }
 @keyframes pulse-in {
 0% { transform: scale(0.95); opacity:0; }
 100% { transform: scale(1); opacity:1; }
 }
 .card.tap-pulse { animation: tap-pulse 0.6s ease-out; }
 @keyframes tap-pulse {
 0% { transform: scale(1); }
 50% { transform: scale(1.03); box-shadow:0 24px 60px rgba(244,163,163,0.4),0 10px 20px rgba(0,0,0,0.1); }
 100% { transform: scale(1); }
 }
</style>
</head>
<body>

<div class="stage">
 <div class="brand">✦ MOOD · CARD ✦</div>

 <div class="card-wrap">
 <div class="card" id="card">
 <div class="illus" id="illus"><img id="illusImg" alt="" decoding="async" fetchpriority="high"></div>
 <div class="divider"></div>
 <div class="message" id="message">—</div>
 <div class="meta">
 <span id="cardNo">№ —</span>
 <span id="cardDate">—</span>
 </div>
 <div class="nfc-tag" id="nfcTag">今日抽取</div>
 </div>
 </div>

 <div class="unsupported" id="unsupported" style="display:none">
 当前浏览器不支持 Web NFC，请用 Android Chrome 打开
 </div>
</div>

<div class="toast" id="toast">已保存</div>

<script>
/* =====================================================
 * 39 张本地压缩插画（600px JPEG，~140KB/张）
 * 路径：images/illus-01.jpg ~ images/illus-39.jpg
 * 1-30: 厚涂油画场景
 * 31-39: 浅笔触+低饱和度风景（v3 风格）
 * GitHub Pages 同源 + 浏览器 HTTP 缓存 + 预热，切卡秒切
 * ===================================================== */
const ILLUS = [];
for (let i = 1; i <= 39; i++) {
 ILLUS.push(`images/illus-${String(i).padStart(2,'0')}.jpg`);
}

/* =====================================================
 * 20 张心情签数据
 * ===================================================== */
const MOODS = [
 { id:1,  illus:1,  color:['#ffd6a5','#fff5d6'], message:'今天的你，像清晨第一缕光，刚刚好。', category:'喜悦' },
 { id:2,  illus:5,  color:['#ffe5b4','#fff0d0'], message:'开心不用理由，笑出声就对了。', category:'喜悦' },
 { id:3,  illus:4,  color:['#ffc4c4','#ffe0e0'], message:'生活的甜，藏在每一个细小的瞬间。', category:'喜悦' },
 { id:4,  illus:2,  color:['#c4e8d4','#e0f5e8'], message:'小小的满足，是今天最好的礼物。', category:'喜悦' },
 { id:5,  illus:5,  color:['#d4c4e8','#e8dcf5'], message:'慢一点也没关系，花会慢慢开。', category:'治愈' },
 { id:6,  illus:6,  color:['#c4d8e8','#dce8f5'], message:'允许自己什么都不做，也是一种勇敢。', category:'治愈' },
 { id:7,  illus:7,  color:['#f5d4c4','#fce0d4'], message:'累了就停下来，世界不会因为你休息就崩塌。', category:'治愈' },
 { id:8,  illus:8,  color:['#e8d4c4','#f5e0d4'], message:'温柔待自己，像蜂蜜慢慢淌进热茶。', category:'治愈' },
 { id:9,  illus:26, color:['#e8c4a8','#f5dcc8'], message:'你比自己以为的，要坚韧得多。', category:'力量' },
 { id:10, illus:18, color:['#a8c4e8','#c8dcf5'], message:'潮起潮落都是风景，你只管向前。', category:'力量' },
 { id:11, illus:11, color:['#c4e8a8','#dcf5c8'], message:'根扎得深，才不怕风来。', category:'力量' },
 { id:12, illus:12, color:['#e8a8c4','#f5c8dc'], message:'不必长成玫瑰，做你自己的花就好。', category:'力量' },
 { id:13, illus:13, color:['#d4e8c4','#e8f5d4'], message:'风的方向不重要，重要的是你站得稳。', category:'哲思' },
 { id:14, illus:8,  color:['#c4c4e8','#dcdcf5'], message:'夜再长，也会被清晨替换。', category:'哲思' },
 { id:15, illus:15, color:['#e8e8c4','#f5f5d4'], message:'不必照亮所有人，做自己的光。', category:'哲思' },
 { id:16, illus:19, color:['#a8e8e8','#c8f5f5'], message:'水滴石穿，靠的是持续，不是力度。', category:'哲思' },
 { id:17, illus:24, color:['#ffd4e8','#ffe0f0'], message:'今天的事，今天的蛋糕，明天的事明天再说。', category:'趣味' },
 { id:18, illus:21, color:['#e8d4ff','#f0e0ff'], message:'发呆也是一种正经事。', category:'趣味' },
 { id:19, illus:23, color:['#d4ffe8','#e0fff0'], message:'好运在来的路上，可能就在下一个转角。', category:'趣味' },
 { id:20, illus:22, color:['#ffe8d4','#fff0e0'], message:'像刚出炉的可颂，外酥里嫩地活着。', category:'趣味' },
 { id:21, illus:31, color:['#e8e0d4','#f0e8dc'], message:'走过的路，每一段都算数。', category:'治愈' },
 { id:22, illus:33, color:['#c8d8c0','#dce8d4'], message:'心里有光，路就不远。', category:'治愈' },
 { id:23, illus:35, color:['#a8c4d4','#c4dce8'], message:'浪来千百次，礁石还在这里。', category:'力量' },
 { id:24, illus:38, color:['#c0c4c8','#d4d8dc'], message:'阴天不是缺晴，是云在给自己放假。', category:'哲思' },
 { id:25, illus:36, color:['#d4e0e8','#dce8f0'], message:'像远帆一样，自在地飘一飘。', category:'趣味' },
];

let currentCard = null;
let ndefReader = null;
let nfcId = null;
let isFirstRender = true;

function hashCode(str) {
 let hash = 0;
 for (let i = 0; i < str.length; i++) {
 hash = ((hash << 5) - hash) + str.charCodeAt(i);
 hash |= 0;
 }
 return hash;
}

function pickCard(seedId) {
 if (seedId) return MOODS[Math.abs(hashCode(seedId)) % MOODS.length];
 return MOODS[Math.floor(Math.random() * MOODS.length)];
}

function formatDate(d) {
 const m = d.getMonth() + 1, day = d.getDate();
 const h = d.getHours(), min = d.getMinutes();
 return `${m}月${day}日 ${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}

function renderCard(card, seedId, withTapPulse) {
 currentCard = card;
 nfcId = seedId;

 const img = document.getElementById('illusImg');
 const illus = document.getElementById('illus');
 img.classList.remove('ready');
 const src = ILLUS[card.illus - 1];
 if (img.src.endsWith(src) && img.complete && img.naturalWidth > 0) {
 // 同一张图已加载，直接显示
 img.classList.add('ready');
 } else {
 img.src = src;
 }
 img.onload = () => img.classList.add('ready');
 img.onerror = () => img.classList.add('ready'); // 失败也显示，别卡白屏

 document.getElementById('message').textContent = card.message;
 document.getElementById('cardNo').textContent = '№ ' + String(card.id).padStart(3, '0');
 document.getElementById('cardDate').textContent = formatDate(new Date());
 document.getElementById('nfcTag').textContent = seedId ? `NFC · ${seedId.slice(0,8)}` : '今日抽取';

 const cardEl = document.getElementById('card');
 if (withTapPulse) {
 cardEl.classList.remove('tap-pulse');
 void cardEl.offsetWidth;
 cardEl.classList.add('tap-pulse');
 } else if (isFirstRender) {
 cardEl.style.animation = 'none';
 void cardEl.offsetWidth;
 cardEl.style.animation = 'pulse-in 0.5s ease-out';
 isFirstRender = false;
 }
}

/* ===================== 预热：空闲时静默加载所有插画 ===================== */
function warmup() {
 // requestIdleCallback 不支持时降级到 setTimeout
 const ric = window.requestIdleCallback || ((cb) => setTimeout(cb, 200));
 ILLUS.forEach((src, i) => {
 ric(() => {
 const img = new Image();
 img.decoding = 'async';
 img.src = src;
 });
 });
}

/* ===================== 音效 ===================== */
let audioCtx = null;
function getAudio() {
 if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
 return audioCtx;
}
function playShimmer() {
 const ctx = getAudio();
 if (!ctx) return;
 const now = ctx.currentTime;
 for (let i = 0; i < 5; i++) {
 const o = ctx.createOscillator();
 const g = ctx.createGain();
 o.type = 'sine';
 const freq = 1200 + Math.random() * 800;
 o.frequency.setValueAtTime(freq, now + i * 0.05);
 g.gain.setValueAtTime(0.05, now + i * 0.05);
 g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.3);
 o.connect(g).connect(ctx.destination);
 o.start(now + i * 0.05);
 o.stop(now + i * 0.05 + 0.3);
 }
}

/* ===================== Toast ===================== */
function toast(msg) {
 const t = document.getElementById('toast');
 t.textContent = msg;
 t.classList.add('show');
 setTimeout(() => t.classList.remove('show'), 1500);
}

/* ===================== NFC ===================== */
async function startNFC() {
 if (!('NDEFReader' in window)) {
 document.getElementById('unsupported').style.display = 'block';
 return;
 }
 try {
 ndefReader = new NDEFReader();
 await ndefReader.scan();
 ndefReader.addEventListener('reading', onNFCRead);
 } catch (e) {
 console.log('NFC 启动失败:', e.message);
 }
}

function onNFCRead({ serialNumber }) {
 const seedId = serialNumber || ('nfc-' + Date.now());
 getAudio();
 const card = pickCard(seedId);
 renderCard(card, seedId, true);
 playShimmer();
 if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
}

/* ===================== 启动 ===================== */
window.addEventListener('load', () => {
 startNFC();
 const card = pickCard(null);
 renderCard(card, null, false);
 // 首屏显示后再预热其余图
 setTimeout(warmup, 100);
});
</script>
</body>
</html>
